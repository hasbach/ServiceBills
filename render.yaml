# Render blueprint (starter). Deploys the Dockerfile + a managed Postgres.
# Secrets marked sync:false are entered in the Render dashboard (never committed).
# Starter runs 1 web worker with the scheduler in-process (fires jobs once). To
# scale, set RUN_SCHEDULER=0 here, raise -w, and add a 1-instance worker service
# with RUN_SCHEDULER=1 (see DEPLOY.md).
databases:
  - name: servicesbills-db
    databaseName: servicesbills
    user: servicesbills
    plan: free

services:
  - type: web
    name: servicesbills-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free            # $0 — spins down when idle (~30-60s cold start). Bump to "starter" for always-on.
    healthCheckPath: /manifest.json
    dockerCommand: sh -c "flask db upgrade && gunicorn -w 1 -b 0.0.0.0:$PORT --timeout 120 app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: servicesbills-db, property: connectionString }
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_APP
        value: app.py
      - key: DISABLE_AUTO_CREATE_ALL
        value: "1"
      - key: RUN_SCHEDULER
        value: "1"
      - key: FERNET_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Start with local storage + console email so the first deploy needs only
      # Postgres + FERNET_KEY. Switch STORAGE_BACKEND=s3 and MAIL_BACKEND=smtp
      # (and fill the vars below) once R2/SMTP are ready.
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_PREFIX
        value: uploads
      - key: AWS_REGION
        value: auto
      - key: S3_ENDPOINT_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: MAIL_BACKEND
        value: console
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
