# Render blueprint — free web service, external Postgres (Supabase).
# Secrets marked sync:false are entered in the Render dashboard (never committed).
# Free web spins down when idle; the in-process scheduler (RUN_SCHEDULER=1, -w 1)
# only runs while awake. Set DATABASE_URL to your Supabase SESSION-pooler URL.
services:
  - type: web
    name: servicesbills-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free            # $0 — spins down when idle (~30-60s cold start). Bump to "starter" for always-on.
    healthCheckPath: /manifest.json
    # No dockerCommand: the Dockerfile CMD already runs migrations + gunicorn on $PORT.
    envVars:
      - key: DATABASE_URL
        sync: false        # paste your Supabase Session-pooler connection string
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_APP
        value: app.py
      - key: DISABLE_AUTO_CREATE_ALL
        value: "1"
      - key: RUN_SCHEDULER
        value: "1"
      - key: FERNET_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # R2 + SMTP are live: storage writes to Cloudflare R2, email sends via SMTP.
      # Fill the sync:false vars below in the Render dashboard.
      - key: STORAGE_BACKEND
        value: s3
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_PREFIX
        value: uploads
      - key: AWS_REGION
        value: auto
      - key: S3_ENDPOINT_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: MAIL_BACKEND
        value: smtp
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
